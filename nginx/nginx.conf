server {
    listen 80;
    server_name _;

    # Use Docker's internal DNS resolver with short TTL so nginx re-resolves
    # container IPs after rebuilds instead of caching stale addresses.
    resolver 127.0.0.11 valid=5s;

    client_max_body_size 10m;

    location /api/ {
        set $backend_host backend:8000;
        proxy_pass http://$backend_host;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (RCON console)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location / {
        set $frontend_host frontend:80;
        proxy_pass http://$frontend_host;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

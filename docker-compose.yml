services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: garrison
      POSTGRES_PASSWORD: garrison
      POSTGRES_DB: garrison
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U garrison"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - garrison

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://garrison:garrison@db:5432/garrison
      GARRISON_PLUGINS_DIR: /data/plugins
    volumes:
      - ./plugins:/data/plugins
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "cd /app && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    networks:
      - garrison

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    depends_on:
      - backend
    networks:
      - garrison

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - garrison

volumes:
  pgdata:

networks:
  garrison:
    driver: bridge

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: garrison
      POSTGRES_PASSWORD: garrison
      POSTGRES_DB: garrison
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U garrison"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - garrison

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - garrison

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://garrison:garrison@db:5432/garrison
      GARRISON_PLUGINS_DIR: /data/plugins
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID:-}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      REDIS_URL: redis://redis:6379
    volumes:
      - ./plugins:/data/plugins
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "cd /app && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    networks:
      - garrison

  # Scale workers: docker compose up --scale worker=3
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://garrison:garrison@db:5432/garrison
      GARRISON_PLUGINS_DIR: /data/plugins
      REDIS_URL: redis://redis:6379
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
    volumes:
      - ./plugins:/data/plugins
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: 1
    networks:
      - garrison

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    depends_on:
      - backend
    networks:
      - garrison

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - garrison

volumes:
  pgdata:
  redis_data:

networks:
  garrison:
    driver: bridge
